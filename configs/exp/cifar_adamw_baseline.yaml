# Fixed-structure AdamW baseline on COLOUR CIFAR-10, tuned hyperparameters,
# NO FGD, NO dropout, NO normalization. The reference the grown method is
# compared against. Same data budget as the method runs (10k/2k/2k) so the
# comparison is fair.
run:
  name: cifar_adamw_baseline_3072x512x512
  results_dir: results
  save_plot: false
  show_plot: false

data:
  kind: cifar10
  in_features: 3072
  out_features: 10
  data_dir:
  batch_size: 64
  train_seed: 0
  validation_seed: 2
  test_seed: 1
  cifar_grayscale: false
  cifar_train_samples: 10000
  cifar_validation_samples: 2000
  cifar_test_samples: 2000

model:
  hidden_size: 512
  number_hidden_layers: 2
  model_seed: 0

training:
  method: normal
  epochs: 100
  accuracy_tolerance: 0.1
  gradient_clip_norm: 1.0
  log_every: 5
  device: auto

optimizer:
  name: adamW
  learning_rate: 0.001
  momentum: 0.0
  weight_decay: 0.01
  nesterov: false
  betas: [0.9, 0.999]
  eps: 1.0e-8

lr_scheduler:
  name: cosineannealing
  t_max: 100
  eta_min: 0.0
  restart_on_growth: false

growth_schedule:
  enabled: false
  every: 100
  first_epoch: 50
  layer_policy: round_robin

wandb:
  enabled: true
  project: stable-tiny
  entity:
  group: baselines
  job_type: train
  tags: [adamw, fixed_structure, cifar10, color, baseline, no_reg]
  notes: Fixed-structure AdamW baseline, colour CIFAR-10, no dropout/norm, comparison reference
  mode: online
  dir: results
