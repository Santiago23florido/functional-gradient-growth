run:
  name: gromo_base_200e_grow50
  results_dir: results
  save_plot: true
  show_plot: false

data:
  in_features: 10
  out_features: 3
  train_batches: 10
  test_batches: 1
  batch_size: 1000
  train_seed: 0
  test_seed: 1

model:
  hidden_size: 2
  number_hidden_layers: 2
  model_seed: 0

training:
  epochs: 200
  grow_every: 50
  learning_rate: 0.01
  scaling_factors: [0.0, 0.1, 0.5, 1.0]
  accuracy_tolerance: 1.0
  log_every: 10
  device: auto
