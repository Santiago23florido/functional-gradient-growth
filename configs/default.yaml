run:
  name: gromo_base_200e_grow50
  results_dir: results
  save_plot: true
  show_plot: false

data:
  kind: smooth_sin
  in_features: 10
  out_features: 3
  train_batches: 10
  test_batches: 1
  batch_size: 512
  train_seed: 0
  test_seed: 1
  active_features: 5
  frequency: 1.5
  phase_shift: 0.5
  interaction_strength: 0.25
  linear_strength: 0.1

model:
  hidden_size: 64
  number_hidden_layers: 3
  model_seed: 0

training:
  epochs: 1000
  accuracy_tolerance: 0.1
  gradient_clip_norm: 1.0
  log_every: 10
  device: auto

optimizer:
  name: adamW
  learning_rate: 0.01
  momentum: 0.0
  weight_decay: 0.0
  nesterov: false
  betas: [0.9, 0.999]
  eps: 1.0e-8

lr_scheduler:
  name: cosineannealing
  t_max: 50
  eta_min: 0.0
  restart_on_growth: true

scaling_line_search:
  method: golden_section
  min_value: 0.0
  max_value: 1.0
  iterations: 12
  tolerance: 0.001

growth_schedule:
  enabled: true
  every: 100
  first_epoch: 50
  layer_policy: round_robin
