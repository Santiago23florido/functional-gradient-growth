# Compare scheduled GroMo/TINY with AdamW against functional-certificate-triggered TINY.

run_name: teacher_functional_compare
out_dir: results
seed: 0
device: null
methods:
  - gromo_tiny
  - functional_triggered_tiny

# --- task -------------------------------------------------------------------
task: teacher
in_features: 20
out_features: 10
teacher_hidden: 128
n_train: 5000
n_test: 1000
label_noise: 0.0
batch_size: 64

# --- student model -----------------------------------------------------------
hidden_size: 16
number_hidden_layers: 2

# --- scheduled TINY ----------------------------------------------------------
optimizer: adamw
lr: 0.05
momentum: 0.9
weight_decay: 0.01
growth_steps: 4
epochs_per_step: 3
final_epochs: 3
maximum_added_neurons: 64
line_search_factors: [0.0, 0.1, 0.25, 0.5, 0.75, 1.0, 1.5, 2.0]

# --- functional-triggered TINY ----------------------------------------------
functional_lr: 0.05
functional_damping: 0.0001
functional_relative_error_tolerance: 0.2
functional_cg_min_iter: 1
functional_cg_max_iter: 1024
functional_cg_tolerance: 0.0001
functional_weight_decay: 0.01
functional_grad_clip: null
functional_batch_limit: 4
functional_progress_every: 1
functional_warmup_epochs: 2
functional_failure_patience: 2
functional_growth_steps: 12
functional_max_epochs: 15
functional_stop_when_growth_budget_exhausted: false
functional_growth_layer_selection: tiny_best
