run:
  name: fgd_tangent_projection
  results_dir: results
  save_plot: false
  show_plot: false

data:
  kind: smooth_sin
  in_features: 10
  out_features: 3
  train_batches: 10
  validation_batches: 10
  test_batches: 1
  batch_size: 512
  train_seed: 0
  validation_seed: 2
  test_seed: 1
  active_features: 5
  frequency: 1.5
  phase_shift: 0.5
  interaction_strength: 0.25
  linear_strength: 0.1

model:
  hidden_size: 2
  number_hidden_layers: 3
  model_seed: 0

training:
  method: fgd_approx
  epochs: 1000
  accuracy_tolerance: 0.1
  gradient_clip_norm:
  log_every: 10
  device: auto

optimizer:
  name: sgd
  learning_rate: 0.01
  momentum: 0.0
  weight_decay: 0.0
  nesterov: false
  betas: [0.9, 0.999]
  eps: 1.0e-8

lr_scheduler:
  name: cosineannealing
  t_max: 50
  eta_min: 0.0
  restart_on_growth: true

fgd_approx:
  rel_error_threshold: 0.5
  rel_error_mode: tangent_projection
  layer_selection: certifying
  projection_solver: exact
  learning_rate_policy: theory_interval
  projection_damping: 0.01
  cg_max_iterations: 16
  cg_tolerance: 1.0e-4
  theory_smoothness_constant: 2.0
  theory_alpha: 1.0
  theory_beta: 1.0
  theory_mu: 2.0
  theory_loss_star: 0.0
  theory_lr_safety: 0.95
  theory_lr_initial: 0.01
  theory_lr_min: 1.0e-5
  theory_lr_follow_bound: true
  theory_lr_search_steps: 8
  theory_lr_search_refinements: 4
  sufficient_descent_c: 0.1
  lr_backtrack: 0.5
  lr_min_factor: 0.001
  global_bound_action: lr_then_growth
  rel_error_compute_delta: true
  growth_compute_delta: false
  eps: 1.0e-12
  tiny_use_covariance: true
  tiny_alpha_zero: false
  tiny_omega_zero: false
  tiny_use_projection: true
  tiny_ignore_singular_values: false
  tiny_use_fisher: false
  tiny_maximum_added_neurons:
  tiny_numerical_threshold: 1.0e-6
  tiny_statistical_threshold: 1.0e-3

secant_fgd:
  enabled: true
  inner_steps: 8
  inner_learning_rate: 0.01
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0
  search_steps: 3
  max_learning_rate: 0.1
  min_learning_rate_factor: 0.01
  growth_min_relative_error_improvement: 0.001
  growth_min_learning_rate_improvement: 0.05

scaling_line_search:
  method: golden_section
  min_value: 0.0
  max_value: 1.0
  iterations: 12
  tolerance: 0.001

growth_schedule:
  enabled: true
  every: 100
  first_epoch: 50
  layer_policy: round_robin

wandb:
  enabled: true
  project: stable-tiny
  entity:
  run_name:
  group: fgd
  job_type: train
  tags: [fgd_approx, gromo, tangent_projection, exact_projection, theory_lr]
  notes:
  mode: online
  dir: results
  log_code: false
