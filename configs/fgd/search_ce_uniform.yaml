# Default certified growth-and-train configuration (Algorithm 5).
#
# Starts from a minimal 3x2 network and grows only when the paper's
# structural criterion fires (Lemma 3.5 admissibility failure,
# eps >= rel_error_threshold). No parameter budget and no growth
# schedule: the descent-per-added-parameter criterion is a ratio, so it
# transfers to datasets that have never been trained.
run:
  name: fgd_search_ce_uniform
  results_dir: results
  save_plot: false
  show_plot: false

data:
  kind: mnist
  in_features: 784
  out_features: 10
  data_dir:
  batch_size: 64
  train_seed: 0
  validation_seed: 2
  test_seed: 1
  mnist_train_samples: 10000
  mnist_validation_samples: 2000
  mnist_test_samples: 2000

model:
  hidden_size: 2
  number_hidden_layers: 3
  model_seed: 0

training:
  method: fgd_approx
  epochs: 80
  accuracy_tolerance: 0.1
  gradient_clip_norm:
  log_every: 1
  device: auto

optimizer:
  name: sgd
  learning_rate: 0.01
  momentum: 0.0
  weight_decay: 0.0
  nesterov: false
  betas: [0.9, 0.999]
  eps: 1.0e-8

lr_scheduler:
  name: cosineannealing
  t_max: 50
  eta_min: 0.0
  restart_on_growth: true

fgd_approx:
  rel_error_threshold: 0.5
  rel_error_mode: tangent_projection
  layer_selection: certifying
  projection_solver: exact_kernel_eigh
  learning_rate_policy: theory_interval
  projection_damping: 0.01
  cg_max_iterations: 16
  cg_tolerance: 1.0e-4
  theory_smoothness_constant: 2.0
  theory_alpha: 1.0
  theory_beta: 1.0
  theory_mu: 2.0
  theory_loss_star: 0.0
  theory_lr_safety: 0.95
  theory_lr_initial: 0.01
  theory_lr_min: 1.0e-5
  theory_lr_follow_bound: false
  theory_lr_search_steps: 8
  theory_lr_search_refinements: 4
  sufficient_descent_c: 0.1
  lr_backtrack: 0.5
  lr_min_factor: 0.001
  global_bound_action: grow
  rel_error_compute_delta: true
  growth_compute_delta: true
  projection_group_size: 1
  projection_group_auto: true
  projection_group_max:
  # Joint certification probe: number of mini-batches concatenated into the
  # FIXED probe on which every certificate solves ONE shared-direction
  # projection (the projection_group_* keys above are deprecated: they used
  # to aggregate independent per-batch projections).
  probe_batches: 4
  # A rejected fallback family is skipped until this many ACCEPTED outer
  # steps have been committed since the rejection (weight updates change the
  # tangent space, so rejection is never permanent at a fixed architecture).
  # Growth clears all rejection state immediately; 0 retries every epoch.
  family_rejection_cooldown: 0
  # Acceptance mode. true: an outer step commits on its four LOCAL
  # conditions only (valid sensor, strict RelErr < 0.5, strict LR interval
  # theory_lr_min < eta < eta_bar, STRICT realized validation descent) and
  # the stationary/global bounds are computed and logged as trajectory
  # diagnostics. false (default): legacy behavior — non-strict descent and
  # Cstat/Cglob as acceptance gates.
  outer_steps_per_epoch: 8
  growth_patience: 1
  # Certified functional: cross-entropy keeps convexity (global optimality)
  # and is 4x smoother than MSE (wider admissible interval), but has NO
  # global PL constant, so the C_glob linear envelope is left undefined.
  # See report/CROSS_ENTROPY_FGD.md.
  functional_loss: cross_entropy
  # Cross-entropy's infimum is not attained (f_c -> inf), so SOME family
  # step always certifies. Without this the structural step would be
  # postponed for ever while the network stays inadequate. Self-limiting
  # through eps -- no parameter budget involved.
  admissibility_failure_forces_growth: false
  growth_limit_criterion: epsilon_stationary
  growth_selection: descent_per_parameter
  growth_lookahead_steps: 10
  # The fallback families must stay available once the structure becomes
  # adequate (eps < 1/2): otherwise growth correctly stops and the flow is
  # left with the tangent alone, which freezes it.
  families_available_without_growth: true
  local_acceptance_conditions: true
  eps: 1.0e-12
  tiny_use_covariance: true
  tiny_alpha_zero: false
  tiny_omega_zero: false
  tiny_use_projection: true
  tiny_ignore_singular_values: false
  tiny_use_fisher: false
  tiny_maximum_added_neurons: 4
  tiny_numerical_threshold: 1.0e-6
  tiny_statistical_threshold: 1.0e-3
  #function preserving or no
  growth_function_preserving: false
  growth_prefer_lower_error: true
  growth_select_by_descent: true
  growth_requires_admissibility_failure: true
  growth_uniform: true
  max_total_parameters:
  growth_preservation_tolerance: 1.0e-6
  # Ordered ladder of approximation families, evaluated top to bottom.
  # "tangent" must come first (it is the epoch's main transactional
  # search). Each following family is consulted only after every family
  # above it fails to certify, and structural growth is probed only after
  # ALL listed families fail. Every family commits through the same full
  # FGD certificate (Crel, LR interval, descent, Cstat, Cglob).
  # Uncomment a family to enable it, same pattern as
  # growth_function_preserving:
  family_order:
    - tangent
    #- rkhs_head
    #- parametric_gd
    - parametric_descent
  # In-ladder rkhs_head margin: the head must improve the FULL validation
  # functional by this relative amount (filters the train-subsample jitter
  # that otherwise re-accepts an epsilon improvement forever).
  rkhs_family_min_relative_improvement: 1.0e-3

# Parametric-GD secant family. Only consulted when "parametric_gd" is
# listed in fgd_approx.family_order. A disposable clone is trained
# parametrically toward the functional target f - eta*r; the realized
# output displacement Delta = F(base) - F(candidate) is screened on
# validation by its directional cosine against the functional gradient
# (min_cosine) and then certified at the scale-optimal declared rate
# eta* = <Delta, r> / |r|^2, which is the fix for the historical scale
# mismatch of this family. With eta* the best achievable relative error
# is exactly sqrt(1 - cos^2), so cosines below sqrt(1 - 0.5^2) = 0.866
# can never satisfy Crel < 0.5: candidates that fail the screen are
# discarded BEFORE certification and the ladder simply moves on, so a
# misaligned family can no longer push the flow into nonstop growth.
# Measured on MNIST (widths 2-16, fresh and mid-training): best cosine
# ~0.8 -> minimal RelErr ~0.6 > 0.5, so expect this family to decline
# on MNIST at these widths; it is safe to enable and only fires when
# its projection is genuinely admissible.
parametric_gd:
  optimizer: sgd            # sgd | adam (adam measured consistently less aligned)
  inner_learning_rate: 0.05
  inner_steps: [16, 64]     # coarse-to-fine inner budgets per candidate
  functional_learning_rates: [0.2, 0.05]
  min_cosine: 0.9           # mathematical floor for Crel<0.5 is 0.866
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0

# Measured-descent parametric family. Only consulted when
# "parametric_descent" is listed in fgd_approx.family_order. Same candidate
# generation and eta* calibration as parametric_gd, but acceptance follows
# Prop. 3.8 with the descent coefficient MEASURED on validation instead of
# lower-bounded through the relative error: for the empirical sum-MSE
# functional the function-space PL inequality is the exact identity
# |grad L|^2 = 4 L (the configured theory_mu = 2, theory_loss_star = 0), so
# the global contraction G_T <= prod(1 - 2 eta mu r_t) G_0 holds with
# r_t = (L_t - L_{t+1}) / (eta* |grad L_t|^2) and equals the realized loss
# ratio exactly. Crel and the LR interval are NOT gates here (they are one
# sufficient mechanism, which the measurement replaces); the secant relative
# error is still logged as a diagnostic. Cprog (min_progress), Cstat and
# Cglob use the same accumulators as every other family. Because a merely
# descending step certifies, this family fires where parametric_gd declines;
# per-step it certifies realized progress rather than near-gradient
# direction.
parametric_descent:
  optimizer: adamw
  inner_learning_rate: 0.003
  inner_steps: [40]
  # 0.5 makes the functional target exactly y (plain parametric loss descent).
  functional_learning_rates: [0.5]
  weight_decay: 0.05
  min_cosine: 0.0           # 0 = only require a descent direction (eta* > 0)
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0
  # Cprog floor on eta* r_t = D_t / |grad L_t|^2 (= D/4L): every accepted
  # step must remove at least 4*min_progress of the remaining loss (1e-3 =
  # 0.4% per step). Steps below it are REJECTED, marking the structure
  # exhausted for this family so growth takes over. This is the family's
  # only binding gate besides measured descent: its Cglob envelope is tight
  # by construction and Cstat loosens as steps shrink, so set this floor to
  # the smallest per-step progress you consider worth an epoch. 1e-6
  # stagnated MNIST 3x2 at ~40% accuracy on certified crumbs.
  min_progress: 1.0e-4

# Tangent projection only: the certified RKHS head phase is off, so the
# growth_min_* thresholds below still govern the growth probe gate.
# (With "rkhs_head" listed in family_order the phase runs as an in-ladder
# family regardless of this flag.)
secant_fgd:
  enabled: false
  inner_steps: 8
  inner_learning_rate: 0.01
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0
  search_steps: 3
  max_learning_rate: 0.1
  min_learning_rate_factor: 0.01
  growth_min_relative_error_improvement: 0.001
  growth_min_learning_rate_improvement: 0.05

fgd_rkhs:
  feature_whitening: true
  epsilon: 0.25
  lr_safety: 0.9
  steps_per_epoch: 10
  max_train_points: 4096
  growth_epochs_per_cycle: 30

# Ignored while growth_function_preserving is true (the extension is applied
# with fixed scaling 1.0 and zero outgoing weights); kept for compatibility.
scaling_line_search:
  method: golden_section
  min_value: 0.0
  max_value: 1.0
  iterations: 12
  tolerance: 0.001

growth_schedule:
  enabled: true
  every: 100
  first_epoch: 50
  layer_policy: round_robin

wandb:
  enabled: true
  project: stable-tiny
  entity:
  run_name:
  group: fgd-growth
  job_type: train
  tags: [fgd_approx, certified_growth, mnist, from_3x2, cross_entropy]
  notes: Algorithm 5 - certified growth-and-train from a 3x2 network, no parameter budget
  mode: online
  dir: results
  log_code: false
