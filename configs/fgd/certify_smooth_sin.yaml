# Grow-to-certify on the SYNTHETIC task -- the fast sanity check.
#
# Same method as certify_mnist.yaml: grow until the relative-error
# criterion holds, then train with the tangent family alone at
# eta = 0.95 * eta_bar(eps), assuming the remaining condition rather than
# verifying it, until eps stops satisfying the criterion -- then grow again.
#
# smooth_sin is the right place to see whether that CYCLE works at all: the
# target is a known smooth function, sum-MSE gives an exact function-space
# PL constant (mu = 2, L* = 0) where cross-entropy has none, and an epoch
# costs seconds instead of minutes.
run:
  name: fgd_certify_smooth_sin
  results_dir: results
  save_plot: false
  show_plot: false

data:
  kind: smooth_sin
  in_features: 10
  out_features: 3
  train_batches: 10
  validation_batches: 10
  test_batches: 1
  batch_size: 128
  train_seed: 0
  validation_seed: 2
  test_seed: 1
  active_features: 5
  frequency: 1.5
  phase_shift: 0.5
  interaction_strength: 0.25
  linear_strength: 0.1

model:
  hidden_size: 2
  number_hidden_layers: 3
  model_seed: 0

training:
  method: fgd_approx
  epochs: 200
  accuracy_tolerance: 0.1
  gradient_clip_norm:
  log_every: 1
  device: auto

optimizer:
  name: sgd
  learning_rate: 0.01
  momentum: 0.0
  weight_decay: 0.0
  nesterov: false
  betas: [0.9, 0.999]
  eps: 1.0e-8

lr_scheduler:
  name: cosineannealing
  t_max: 50
  eta_min: 0.0
  restart_on_growth: true

fgd_approx:
  rel_error_threshold: 0.5
  rel_error_mode: tangent_projection
  layer_selection: certifying
  projection_solver: exact
  learning_rate_policy: theory_interval
  projection_damping: 0.01
  cg_max_iterations: 16
  cg_tolerance: 1.0e-4
  theory_smoothness_constant: 2.0
  theory_alpha: 1.0
  theory_beta: 1.0
  theory_mu: 2.0
  theory_loss_star: 0.0
  theory_lr_safety: 0.95
  theory_lr_initial: 0.01
  theory_lr_min: 1.0e-5
  theory_lr_follow_bound: false
  theory_lr_search_steps: 8
  theory_lr_search_refinements: 4
  sufficient_descent_c: 0.1
  lr_backtrack: 0.5
  lr_min_factor: 0.001
  global_bound_action: grow
  rel_error_compute_delta: true
  growth_compute_delta: true
  projection_group_size: 1
  projection_group_auto: true
  projection_group_max:
  # Joint certification probe: number of mini-batches concatenated into the
  # FIXED probe on which every certificate solves ONE shared-direction
  # projection (the projection_group_* keys above are deprecated: they used
  # to aggregate independent per-batch projections).
  # Tractable probe. Exactness is preserved (full Jacobian, no CG); what the
  # probe size sets is the STRENGTH of the certificate -- eps < 1/2 here is a
  # statement about 64 samples x 10 classes = 640 output dimensions. Measured
  # cost: 2.4 s per exact eps at this size against 11.1 s at 4 batches, and
  # the loop pays that per candidate per growth.
  # 2 x 128 = 256 samples x 3 outputs = 768 output dimensions. Sized so the
  # loop can actually finish: the residual lives in N*K dimensions, so that
  # is how much rank the tangent space must acquire to capture 80 % of the
  # gradient energy, and the exact solver materialises a (N*K) x P Jacobian
  # per candidate per growth. At 4 x 512 = 6144 rows the run died of CUDA
  # OOM after 23 growths, with eps still at 0.545.
  probe_batches: 2
  # A rejected fallback family is skipped until this many ACCEPTED outer
  # steps have been committed since the rejection (weight updates change the
  # tangent space, so rejection is never permanent at a fixed architecture).
  # Growth clears all rejection state immediately; 0 retries every epoch.
  family_rejection_cooldown: 0
  # Acceptance mode. true: an outer step commits on its four LOCAL
  # conditions only (valid sensor, strict RelErr < 0.5, strict LR interval
  # theory_lr_min < eta < eta_bar, STRICT realized validation descent) and
  # the stationary/global bounds are computed and logged as trajectory
  # diagnostics. false (default): legacy behavior — non-strict descent and
  # Cstat/Cglob as acceptance gates.
  outer_steps_per_epoch: 8
  growth_patience: 1
  # Certified functional: cross-entropy keeps convexity (global optimality)
  # and is 4x smoother than MSE (wider admissible interval), but has NO
  # global PL constant, so the C_glob linear envelope is left undefined.
  # See report/CROSS_ENTROPY_FGD.md.
  functional_loss: mse
  # Cross-entropy's infimum is not attained (f_c -> inf), so SOME family
  # step always certifies. Without this the structural step would be
  # postponed for ever while the network stays inadequate. Self-limiting
  # through eps -- no parameter budget involved.
  admissibility_failure_forces_growth: false
  growth_limit_criterion: epsilon_stationary
  # SENN's where (arXiv:2307.04526). Locations are ranked by the natural
  # expansion score -- GroMo's sum(eigenvalues_extension^2), which is the
  # extension's first-order loss decrease -- and capacity is added at the
  # argmax, with the scores RECOMPUTED after each addition (their Ingredient
  # 4 adds and repeats). The addition budget per growth event equals the
  # number of growable layers, exactly what uniform widening spends, so the
  # comparison against search_ce_uniform.yaml isolates the ALLOCATION.
  # GROW-TO-CERTIFY: grow until Lemma 3.5 holds, then step. Only the tangent
  # family, only steps the 1/2 condition certifies. Parameter count is
  # explicitly NOT a concern -- the question is whether exact certification
  # alone reaches the best loss and accuracy.
  grow_to_certify: true
  # Sized from the MEASURED rate on this probe: eps falls ~0.0018 per growth
  # (1.824 -> 1.643 over 46), so reaching 1/2 from a 3x2 start needs ~670.
  # The reason is dimensional, not a defect: each preserving growth adds ~9
  # tangent directions while the residual lives in 64x10 = 640 dimensions, and
  # capturing 80% of the gradient energy over those needs hundreds. Parameter
  # count is deliberately not a constraint here -- the question is whether
  # exact certification, whatever it costs, delivers the best accuracy.
  certify_function_preserving: false
  certify_max_growths: 400
  # PAPER-PURE STEP. Lemma 3.5 does not offer descent as a condition to
  # verify -- it PROVES it: eps < 1/2 implies every eta in (0, eta_bar(eps))
  # descends. So the flow keeps the rate the certificate licenses (the same
  # theory_lr_safety * eta_bar the ordinary sweep would start from, 0.95 of
  # the interval) and simply applies it -- one rate, no sweep, no empirical
  # descent gate, exactly as the paper's algorithm does.
  #
  # The rate must come from THAT certificate and not be recomputed from
  # another sample. MEASURED: deriving it from the train-probe eps the grow
  # loop certifies looks like the same formula but is a different number --
  # small eps means large eta_bar, and at eps ~ 0.42 it gave eta = 0.86
  # against |u| = 15, a parameter displacement of ~13 that left the linear
  # regime and diverged (validation loss 4.1e3 -> 2.7e4 in five steps).
  # Lemma 3.5 governs a FUNCTION-space step f - eta g; what is taken is a
  # PARAMETER-space step theta - eta u, and they agree only while eta |u| is
  # small enough for f(theta - eta u) ~ f(theta) - eta J u to hold.
  #
  # Why this matters here, MEASURED: with the gate on, the flow deadlocked.
  # eps = 0.475 certified the structure so no growth fired, while no rate
  # produced held-out descent so no step committed -- epochs 2, 3 and 4 came
  # out bit-identical (loss 0.0619, acc 0.566, delta +0.0000). The gate was
  # unsatisfiable rather than informative: eps is certified on the TRAIN
  # probe and descent was demanded on the VALIDATION probe, and Lemma 3.5
  # guarantees descent only on the sample where eps was measured.
  certify_apply_in_interval: true
  # Enforce Lemma 3.5's HYPOTHESIS: that theta - eta u is the function-space
  # step f - eta g the lemma is about. Without it this exact config diverged
  # while the certificate stayed healthy -- eta rose 0.005 -> 0.855 as eps
  # FELL 0.50 -> 0.085, loss 2.3e3 -> 7.5e7, accuracy 0.087 -> 0.004 -- because
  # eta_bar(eps) -> 2/L_s as eps -> 0, so the better the certificate the larger
  # the step it authorises and the further outside the linear regime it lands.
  #
  # 0.1: the realised displacement must match the predicted one to within
  # 10 % of its size. This is not the descent check that was removed -- the
  # defect never looks at the loss (tests/test_linearization.py pins that
  # reversing the update's sign leaves it unchanged). It only narrows eta
  # INSIDE the certified interval.
  certify_linearization_tolerance: 0.1
  tangent_measured_descent: false
  growth_selection: unified_expansion
  # Generalised R1: eps < 1/2 is Lemma 3.5 step-admissibility, not structural
  # adequacy. Before stopping, check whether growing the bottleneck reaches a
  # strictly lower eps than training longer would (both clones trained the
  # same steps -- an apples-to-apples look-ahead). Verified a strict
  # generalisation: MNIST on==off (identical growths, 0 firings while eps>1/2).
  # Only pays its cost in the tail (eps<1/2), and reuses tiny_statistical_
  # threshold as the margin -- no new constant.
  growth_lookahead_adequacy: true
  growth_lookahead_steps: 10
  # The fallback families must stay available once the structure becomes
  # adequate (eps < 1/2): otherwise growth correctly stops and the flow is
  # left with the tangent alone, which freezes it.
  families_available_without_growth: true
  local_acceptance_conditions: true
  eps: 1.0e-12
  tiny_use_covariance: true
  tiny_alpha_zero: false
  tiny_omega_zero: false
  tiny_use_projection: true
  tiny_ignore_singular_values: false
  # MEASURED: leave this false. Enabling the output-side Kronecker factor
  # makes the score rank layer 2 top (37.7 vs 11.0 for layer 0) while the
  # scaling line search then rejects that very extension outright
  # (best_scaling = 0.000, train_loss 0.187 -- the WORST of the three). In
  # the end-to-end run 7 of 8 growth events took scaling 0, adding dead
  # parameters, so eps never improved, R1 re-fired every epoch and the run
  # stalled at 65.6%. The Fisher-preconditioned score was anti-correlated
  # with the realized outcome here.
  #
  # This is also the metric SENN's own theory states (their 3.4: "for the
  # purposes of simplicity we choose the euclidean metric, corresponding to
  # F := (1/N) J^T J"), and the one the bridge identity in
  # report/SENN_EXPANSION_SCORE.md is derived under. KFAC S (x) A is their
  # practical approximation to it, not the definition.
  tiny_use_fisher: false
  # ONE purchase per growth event -- one neuron or one layer. Maximum
  # resolution, and every structural step is attributable to a single
  # measured certificate, which is what the ranking by Delta(N eta)/cost
  # compares. At 4 the input projection was bought 4 neurons at a time
  # (+3180 parameters per event) and overshot to ~7175 before Lemma 3.5
  # stopped it.
  tiny_maximum_added_neurons: 1
  tiny_numerical_threshold: 1.0e-6
  tiny_statistical_threshold: 1.0e-3
  #function preserving or no
  growth_function_preserving: false
  growth_prefer_lower_error: true
  growth_select_by_descent: true
  growth_requires_admissibility_failure: true
  # Inert here: growth_selection: natural_expansion is checked first and
  # brings its own allocation loop. Left false so the config cannot be
  # misread as running both.
  growth_uniform: false
  max_total_parameters:
  growth_preservation_tolerance: 1.0e-6
  # Ordered ladder of approximation families, evaluated top to bottom.
  # "tangent" must come first (it is the epoch's main transactional
  # search). Each following family is consulted only after every family
  # above it fails to certify, and structural growth is probed only after
  # ALL listed families fail. Every family commits through the same full
  # FGD certificate (Crel, LR interval, descent, Cstat, Cglob).
  # Uncomment a family to enable it, same pattern as
  # growth_function_preserving:
  family_order:
    - tangent
  # In-ladder rkhs_head margin: the head must improve the FULL validation
  # functional by this relative amount (filters the train-subsample jitter
  # that otherwise re-accepts an epsilon improvement forever).
  rkhs_family_min_relative_improvement: 1.0e-3

# Parametric-GD secant family. Only consulted when "parametric_gd" is
# listed in fgd_approx.family_order. A disposable clone is trained
# parametrically toward the functional target f - eta*r; the realized
# output displacement Delta = F(base) - F(candidate) is screened on
# validation by its directional cosine against the functional gradient
# (min_cosine) and then certified at the scale-optimal declared rate
# eta* = <Delta, r> / |r|^2, which is the fix for the historical scale
# mismatch of this family. With eta* the best achievable relative error
# is exactly sqrt(1 - cos^2), so cosines below sqrt(1 - 0.5^2) = 0.866
# can never satisfy Crel < 0.5: candidates that fail the screen are
# discarded BEFORE certification and the ladder simply moves on, so a
# misaligned family can no longer push the flow into nonstop growth.
# Measured on MNIST (widths 2-16, fresh and mid-training): best cosine
# ~0.8 -> minimal RelErr ~0.6 > 0.5, so expect this family to decline
# on MNIST at these widths; it is safe to enable and only fires when
# its projection is genuinely admissible.
parametric_gd:
  optimizer: sgd            # sgd | adam (adam measured consistently less aligned)
  inner_learning_rate: 0.05
  inner_steps: [16, 64]     # coarse-to-fine inner budgets per candidate
  functional_learning_rates: [0.2, 0.05]
  min_cosine: 0.9           # mathematical floor for Crel<0.5 is 0.866
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0

# Measured-descent parametric family. Only consulted when
# "parametric_descent" is listed in fgd_approx.family_order. Same candidate
# generation and eta* calibration as parametric_gd, but acceptance follows
# Prop. 3.8 with the descent coefficient MEASURED on validation instead of
# lower-bounded through the relative error: for the empirical sum-MSE
# functional the function-space PL inequality is the exact identity
# |grad L|^2 = 4 L (the configured theory_mu = 2, theory_loss_star = 0), so
# the global contraction G_T <= prod(1 - 2 eta mu r_t) G_0 holds with
# r_t = (L_t - L_{t+1}) / (eta* |grad L_t|^2) and equals the realized loss
# ratio exactly. Crel and the LR interval are NOT gates here (they are one
# sufficient mechanism, which the measurement replaces); the secant relative
# error is still logged as a diagnostic. Cprog (min_progress), Cstat and
# Cglob use the same accumulators as every other family. Because a merely
# descending step certifies, this family fires where parametric_gd declines;
# per-step it certifies realized progress rather than near-gradient
# direction.
parametric_descent:
  optimizer: adamw
  inner_learning_rate: 0.003
  inner_steps: [40]
  # 0.5 makes the functional target exactly y (plain parametric loss descent).
  functional_learning_rates: [0.5]
  weight_decay: 0.05
  min_cosine: 0.0           # 0 = only require a descent direction (eta* > 0)
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0
  # Cprog floor on eta* r_t = D_t / |grad L_t|^2 (= D/4L): every accepted
  # step must remove at least 4*min_progress of the remaining loss (1e-3 =
  # 0.4% per step). Steps below it are REJECTED, marking the structure
  # exhausted for this family so growth takes over. This is the family's
  # only binding gate besides measured descent: its Cglob envelope is tight
  # by construction and Cstat loosens as steps shrink, so set this floor to
  # the smallest per-step progress you consider worth an epoch. 1e-6
  # stagnated MNIST 3x2 at ~40% accuracy on certified crumbs.
  min_progress: 1.0e-4

# Tangent projection only: the certified RKHS head phase is off, so the
# growth_min_* thresholds below still govern the growth probe gate.
# (With "rkhs_head" listed in family_order the phase runs as an in-ladder
# family regardless of this flag.)
secant_fgd:
  enabled: false
  inner_steps: 8
  inner_learning_rate: 0.01
  parameter_penalty: 1.0e-6
  gradient_clip_norm: 1.0
  search_steps: 3
  max_learning_rate: 0.1
  min_learning_rate_factor: 0.01
  growth_min_relative_error_improvement: 0.001
  growth_min_learning_rate_improvement: 0.05

fgd_rkhs:
  feature_whitening: true
  epsilon: 0.25
  lr_safety: 0.9
  steps_per_epoch: 10
  max_train_points: 4096
  growth_epochs_per_cycle: 30

# Ignored while growth_function_preserving is true (the extension is applied
# with fixed scaling 1.0 and zero outgoing weights); kept for compatibility.
scaling_line_search:
  method: golden_section
  min_value: 0.0
  max_value: 1.0
  iterations: 12
  tolerance: 0.001

# NOT a schedule under method: fgd_approx. Only `enabled` is read here, as
# a master on/off switch for architecture changes; `every`, `first_epoch`
# and `layer_policy` are consulted exclusively by method: normal. Growth
# timing comes from the certificate alone -- Lemma 3.5 (eps >= 0.5) proposes
# it and R1 (eps no longer decreasing) decides whether training may render
# the proposal unnecessary. should_trigger_fgd_growth() opens with
# `del epoch, last_growth_epoch`: no epoch, dwell or cap participates.
growth_schedule:
  enabled: true
  every: 100
  first_epoch: 50
  layer_policy: round_robin

wandb:
  enabled: true
  project: stable-tiny
  entity:
  run_name:
  group: fgd-growth
  job_type: train
  tags: [fgd_approx, certified_growth, smooth_sin, from_3x2, mse, lemma35_cycle]
  notes: Lemma 3.5 cycle on the synthetic task - grow until eps<1/2, then step at 0.95 of the interval
  mode: online
  dir: results
  log_code: false
