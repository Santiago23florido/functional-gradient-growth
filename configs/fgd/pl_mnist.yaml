# Empirical-PL certified full-weight training (training.method: fgd_pl).
#
# Trains ALL weights by full-batch descent under measured certificates:
# mu_t = lambda_min(J J^T)/n is MEASURED on the certificate subset (an
# algebraic identity, never an assumed constant); each step must realize a
# descent coefficient r_t >= r_min (backtracking otherwise); the measured
# envelope L_0 * prod(1 - 2 eta mu r) is validated every epoch. When mu
# collapses (rank-deficient tangent Gram: the structure cannot certify
# global descent) the network grows one GroMo layer and a fresh
# per-structure certificate starts. If mu stays positive down to zero
# loss, the run is certified globally optimal a posteriori (the verified
# NTK regime).

run:
  name: fgd_pl_mnist
  results_dir: results
  save_plot: false
  show_plot: false

data:
  kind: mnist
  in_features: 784
  out_features: 10
  batch_size: 256
  train_seed: 0
  # Full-batch training is cheap; more data is the primary defense
  # against interpolation-driven overfitting (the certificate targets the
  # empirical optimum by design).
  mnist_train_samples: 8192
  mnist_validation_samples: 1000
  mnist_test_samples: 1000

model:
  hidden_size: 2
  number_hidden_layers: 3
  model_seed: 0

training:
  method: fgd_pl
  epochs: 300
  accuracy_tolerance: 0.001
  log_every: 5
  device: auto

fgd_pl:
  learning_rate: 1.0
  # Accepted steps must realize at least this fraction of the first-order
  # predicted descent (still a certified sufficient-descent condition);
  # 0.25 allows larger certified steps than 0.5.
  r_min: 0.25
  backtrack_factor: 0.5
  max_backtracks: 12
  lr_recovery: 1.25
  steps_per_epoch: 10
  # The certificate applies to the empirical loss on this subset; with 64
  # points and 10 outputs the Gram has 640 rows. Fewer rows means a
  # larger measured lambda_min (eigenvalue interlacing), so the
  # certificate switches on earlier -- the honest trade-off is that it
  # certifies a smaller subset.
  certificate_points: 64
  certificate_seed: 0
  mu_collapse_threshold: 1.0e-8
  growth_cooldown_epochs: 3
  growth_max_events: 10
  growth_max_hidden_size: 18
  # Growth must be earned: fires only when mu is collapsed AND the
  # relative per-epoch loss improvement drops below this threshold.
  growth_min_progress: 0.01
  # Ceiling arbiter: every eligible layer is trial-grown and the lowest
  # closed-form head optimum L* wins; skip growth when no candidate
  # improves the current ceiling by at least this relative amount.
  growth_min_ceiling_improvement: 0.01
  # F = L + (ridge/2)||theta||^2. Keep 0.0 to retain the global vs-zero
  # envelope; a small positive value tames output magnitudes at the cost
  # of downgrading the certificate to sufficient descent + stationarity.
  ridge: 0.0
  max_rejected_steps: 3
  # The returned model is the best-validation snapshot along the
  # certified trajectory (deployment choice; certificates unaffected).
  keep_best_validation: true

scaling_line_search:
  method: golden_section
  min_value: 0.0
  max_value: 1.0
  iterations: 12
  tolerance: 0.001

growth_schedule:
  enabled: true
  layer_policy: round_robin

wandb:
  enabled: false
  project: stable-tiny
  group: fgd_pl
  job_type: train
  tags: [fgd_pl, empirical_pl, measured_certificates, mnist]
  mode: online
  dir: results
