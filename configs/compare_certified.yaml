# Compare scheduled GroMo/TINY ("tiny simple") against theory-grounded
# certified functional-gradient growth (arXiv:2606.16926, Algorithm 1).
#
# Both methods start from the same intentionally under-capacity student
# (hidden_size=4) and grow with the same GroMo/TINY machinery. The difference
# is *when* and *until when* they grow:
#   - gromo_tiny: grows on a fixed schedule, trained with AdamW.
#   - functional_certified_tiny: does certified functional-gradient steps with a
#     verified sufficient-descent line search; when the expressivity bottleneck
#     ||grad L - g|| / ||g|| makes the relative-error certificate fail, it grows
#     until the certificate passes again on a probe batch.

run_name: teacher_certified_compare
out_dir: results
seed: 0
device: null
methods:
  - gromo_tiny
  - functional_certified_tiny

# --- task -------------------------------------------------------------------
task: teacher
in_features: 10
out_features: 5
teacher_hidden: 64
n_train: 3000
n_test: 800
label_noise: 0.0
batch_size: 32

# --- student model (starts under-capacity on purpose) ------------------------
hidden_size: 4
number_hidden_layers: 2

# --- scheduled TINY ("tiny simple") -----------------------------------------
optimizer: adamw
lr: 0.05
momentum: 0.9
weight_decay: 0.01
growth_steps: 5
epochs_per_step: 4
final_epochs: 6
maximum_added_neurons: 8
line_search_factors: [0.0, 0.1, 0.25, 0.5, 0.75, 1.0, 1.5, 2.0]

# --- certified functional growth --------------------------------------------
# Exact tangent-space projection (lstsq on the explicit Jacobian): exact for the
# tiny models here, no CG conditioning issues. The bottleneck is ~0 once the
# parameter count exceeds the output-space dimension (B*C) and J is full rank.
functional_projection: exact
# Train with AdamW between growths (apples-to-apples vs gromo_tiny); the
# functional expressivity-bottleneck certificate is used ONLY as the growth
# policy: grow when the probe batch fails to certify, stop once it certifies.
functional_train_optimizer: adamw
functional_damping: 0.01          # ridge / Levenberg-Marquardt for the lstsq solve
functional_relative_error_tolerance: 0.3
functional_cg_min_iter: 1         # (ignored by the exact projection)
functional_cg_max_iter: 192
functional_cg_tolerance: 0.00001
functional_weight_decay: 0.0
functional_grad_clip: null
functional_progress_every: null
functional_warmup_epochs: 1
functional_failure_patience: 1
functional_growth_steps: 10
functional_max_epochs: 26
functional_stop_when_growth_budget_exhausted: false
functional_growth_layer_selection: tiny_best
functional_certify_threshold: 0.6
functional_grow_until_certified: false
functional_max_refines: 6
# FGD-only knobs (unused when functional_train_optimizer=adamw):
functional_lr: 0.5
functional_batch_limit: 16
functional_sufficient_descent_c: 0.1
functional_lr_backtrack: 0.5
functional_lr_min_factor: 0.001
